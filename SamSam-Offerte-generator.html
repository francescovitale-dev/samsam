<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamSam — Offerte generator</title>
<style>
  :root{
    --lime:#9EC63F; --teal:#5BA99B; --bar:#747474; --bar2:#6f6f6f;
    --panel:#ececec; --panel2:#e4e7e9; --ink:#2b2f36; --grey:#6b7280; --border:#e2e5ea;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:#e9ebef;}
  button{font-family:inherit;cursor:pointer;border:0;border-radius:7px;font-weight:bold;font-size:13px;padding:8px 12px;}
  input,textarea,select{font-family:inherit;font-size:13px;padding:6px 7px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--ink);width:100%;}
  textarea{resize:vertical;line-height:1.4;}
  label{display:block;font-size:11px;font-weight:bold;color:var(--grey);margin:7px 0 2px;}

  .topbar{position:sticky;top:0;z-index:30;background:#28303b;color:#fff;display:flex;align-items:center;gap:10px;padding:9px 16px;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-wrap:wrap;}
  .topbar .brand{font-weight:800;font-size:15px;margin-right:auto;}
  .topbar .brand span{color:var(--lime);}
  .btn-print{background:var(--lime);color:#173a12;}
  .btn-save{background:var(--teal);color:#fff;}
  .btn-ghost{background:#3c4553;color:#dfe3e9;}
  .btn-ghost:hover{background:#4b5563;}
  .saved{font-size:12px;color:#aeb6c2;}

  .layout{display:flex;gap:18px;align-items:flex-start;padding:16px;}
  .form{flex:0 0 460px;position:sticky;top:56px;max-height:calc(100vh - 70px);overflow:auto;background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;}
  .prevwrap{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;gap:14px;}

  details.sec{border:1px solid var(--border);border-radius:9px;margin-bottom:10px;background:#fbfcfd;}
  details.sec>summary{font-size:12.5px;font-weight:bold;color:#374151;padding:10px 12px;cursor:pointer;list-style:none;text-transform:uppercase;letter-spacing:.4px;}
  details.sec>summary::-webkit-details-marker{display:none;}
  details.sec[open]>summary{border-bottom:1px solid var(--border);color:var(--teal);}
  .sec-body{padding:10px 12px;}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .hint{font-size:11px;color:#9aa2ad;margin:4px 0 0;}
  .bat-head{font-weight:bold;color:var(--teal);font-size:12px;margin:4px 0;}

  /* ============ document pages ============ */
  .page{background:#fff;width:210mm;min-height:297mm;padding:16mm 15mm 20mm;box-shadow:0 5px 24px rgba(0,0,0,.16);position:relative;overflow:hidden;font-size:11.5px;line-height:1.45;}
  .phead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .phead img.logo{width:74px;height:74px;object-fit:contain;}
  .phead .hr{border-left:2px solid #111;padding-left:14px;line-height:1.35;}
  .phead .hr b{font-size:17px;font-weight:600;display:block;}
  .phead .hr .u{font-size:11px;color:#333;}
  .pnum{position:absolute;right:6mm;bottom:14mm;writing-mode:vertical-rl;color:var(--teal);font-size:11px;letter-spacing:1px;}
  .panel{background:var(--panel);border-radius:10px;padding:14px 16px;}
  .mt{margin-top:14px;}

  .barTitle{background:var(--bar);color:#fff;border-radius:12px 12px 0 0;padding:14px 22px;font-size:30px;font-weight:800;text-align:center;letter-spacing:.5px;}
  .sideLabel{position:absolute;left:0;top:150px;background:var(--teal);color:#fff;writing-mode:vertical-rl;transform:rotate(180deg);padding:14px 7px;border-radius:0 8px 8px 0;font-weight:bold;font-size:12px;letter-spacing:.5px;}

  /* cover */
  .cover{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:297mm;text-align:center;padding-top:40mm;}
  .cover img.big{width:118mm;height:118mm;object-fit:contain;}
  .cover .cust{font-size:26px;font-weight:800;font-style:italic;margin-top:16mm;}
  .cover .zk{position:absolute;bottom:22mm;right:22mm;text-align:right;}
  .cover .zk .s{font-size:12px;color:#555;}
  .cover .zk .z{font-size:30px;font-weight:800;color:#4a4a4a;}
  .cover .zk .z b{color:#f39200;}

  /* letter meta */
  .metaTbl{width:100%;border-collapse:collapse;}
  .metaTbl td{padding:2px 0;vertical-align:top;font-size:12px;}
  .metaTbl td:first-child{width:150px;color:#333;}
  .metaTbl .mail{color:var(--teal);}

  h2.sec-h{font-size:24px;font-weight:800;margin:6px 0 12px;line-height:1.1;}
  .three-ico{display:grid;grid-template-columns:1fr;gap:12px;margin-top:8px;}
  .three-ico .it b{color:var(--teal);}
  .sidebox{background:var(--teal);color:#fff;border-radius:10px;padding:14px 16px;font-size:12px;margin-top:14px;}

  /* battery comparison */
  .cmp{width:100%;border-collapse:collapse;background:var(--panel);}
  .cmp th,.cmp td{padding:5px 8px;font-size:11.5px;text-align:center;}
  .cmp td.lbl,.cmp th.lbl{text-align:left;font-weight:normal;color:#333;}
  .cmp tr{border-bottom:1px dotted #b9bec4;}
  .cmp .merk td{font-weight:bold;font-size:13px;padding-top:8px;}
  .cmp .photos td{padding:0;}
  .cmp .photos img{height:120px;object-fit:contain;}
  .prijsbar{background:var(--bar);color:#fff;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-radius:0 0 4px 4px;}
  .prijsbar div{padding:12px 8px;text-align:center;font-weight:bold;font-size:14px;}
  .prijsbar .pl{text-align:left;}
  .stars{color:#111;letter-spacing:2px;font-size:15px;}

  /* work item */
  .work{display:grid;grid-template-columns:1fr 150px;gap:14px;margin-top:14px;align-items:start;}
  .work .desc h3{font-size:14px;margin:0 0 5px;color:#333;}
  .pricebox{background:var(--panel);border-radius:9px;padding:10px 12px;font-size:11px;text-align:center;}
  .pricebox .amt{font-size:16px;font-weight:800;margin-bottom:6px;}
  .pricebox .opt{color:#444;margin-top:5px;}
  .pricebox .cb{display:inline-block;width:11px;height:11px;border:1px solid #888;border-radius:2px;vertical-align:middle;margin-right:4px;}

  /* investering */
  .inv{width:100%;border-collapse:collapse;}
  .inv td,.inv th{padding:5px 8px;font-size:11.5px;border-bottom:1px dotted #c2c7cd;}
  .inv th{font-weight:bold;}
  .inv .num{text-align:right;white-space:nowrap;}
  .inv .grp td{font-weight:bold;padding-top:9px;border-bottom:0;}
  .inv .tot td{font-weight:bold;border-top:2px solid #333;border-bottom:0;font-size:12.5px;padding-top:8px;}
  .inv .merkrow td{text-align:center;font-weight:bold;background:var(--panel);}
  .keuze{display:inline-block;width:14px;height:14px;border:1px solid #555;border-radius:2px;}

  .signgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
  .signline{border-bottom:1px solid #999;height:26px;margin-top:14px;}
  .footco{position:absolute;left:15mm;right:15mm;bottom:12mm;display:flex;justify-content:space-between;font-size:10.5px;color:#555;border-top:1px solid var(--border);padding-top:8px;}

  @page{size:A4;margin:0;}
  @media print{
    body{background:#fff;}
    .topbar,.form,.no-print{display:none !important;}
    .layout{display:block;padding:0;}
    .prevwrap{display:block;}
    .page{box-shadow:none;width:auto;min-height:auto;margin:0;page-break-after:always;}
    .page:last-child{page-break-after:auto;}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">Sam<span>Sam</span> · Offerte generator</div>
  <button class="btn-print" onclick="window.print()">🖨️ Opslaan als PDF</button>
  <button class="btn-save" onclick="saveOffer()">💾 Opslaan</button>
  <button class="btn-ghost" onclick="openHistory()">🗂️ Opgeslagen</button>
  <button class="btn-ghost" onclick="loadExample()">Voorbeeld</button>
  <button class="btn-ghost" onclick="newOffer()">Nieuw</button>
  <span class="saved" id="saved"></span>
</div>

<div class="layout">
  <div class="form" id="form"><!-- form injected --></div>
  <div class="prevwrap"><div id="doc"></div></div>
</div>

 document.getElementById('doc').innerHTML=[pageCover(),pageLetter(),pagePartner(),pageKwaliteit(),pageCompare(),pageWerk1(),pageWerk2(),pageEms(),pageBetaling(),pageInvest(),pageJaar(),pageSign()].join('');
}

// ===== form =====
function inp(k,label,val){return `<label>${label}</label><input data-k="${k}" value="${esc(val)}" oninput="setPath(this.dataset.k,this.value)">`;}
function buildForm(){
 const c=D.customer,v=D.inv,w=D.werk,j=D.jaar;
 let batForm=D.batteries.map((b,i)=>`<details class="sec"><summary>Batterij ${i+1}: ${esc(b.merk)}</summary><div class="sec-body">
   <div class="g2">${inp('batteries.'+i+'.merk','Merk',b.merk)}${inp('batteries.'+i+'.type','Type',b.type)}</div>
   <div class="g2">${inp('batteries.'+i+'.prijs','Prijs per Unit (comm.)',b.prijs)}${inp('batteries.'+i+'.prijsInvest','Prijs in investeringstabel',b.prijsInvest)}</div>
   <div class="g2">${inp('batteries.'+i+'.capaciteit','Capaciteit',b.capaciteit)}${inp('batteries.'+i+'.vermogen','Vermogen (kW)',b.vermogen)}</div>
   <div class="g2">${inp('batteries.'+i+'.sterren','Sterren (0-5)',b.sterren)}${inp('batteries.'+i+'.cycli','Cycli',b.cycli)}</div>
   <details class="sec" style="margin-top:8px"><summary>Alle specificaties</summary><div class="sec-body g2">
     ${BATFIELDS.map(f=>inp('batteries.'+i+'.'+f[0],f[1],b[f[0]])).join('')}
   </div></details>
 </div></details>`).join('');

 document.getElementById('form').innerHTML=`
  <details class="sec" open><summary>Klantgegevens</summary><div class="sec-body">
    ${inp('customer.naam','Bedrijfsnaam / klant',c.naam)}
    <div class="g2">${inp('customer.adres1','Adres',c.adres1)}${inp('customer.adres2','Postcode + plaats',c.adres2)}</div>
    ${inp('customer.plaatsdatum','Plaats, datum',c.plaatsdatum)}
    ${inp('customer.aanhef','Aanhef',c.aanhef)}
    ${inp('customer.referentie','Referentie',c.referentie)}
    <div class="g2">${inp('customer.contact','Contactpersoon',c.contact)}${inp('customer.email','E-mail',c.email)}</div>
    <div class="g2">${inp('customer.onderwerp','Onderwerp',c.onderwerp)}${inp('customer.geldigheid','Geldigheid',c.geldigheid)}</div>
  </div></details>

  <details class="sec"><summary>Aangeboden batterijen</summary><div class="sec-body">
    <label>Aantal kolommen (opties)</label>
    <select data-k="cols" onchange="setPath('cols',this.value)"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
    <p class="hint">Kies hoeveel batterijopties je naast elkaar toont.</p>
    ${batForm}
  </div></details>

  <details class="sec"><summary>Investering (prijzen tabel)</summary><div class="sec-body g2">
    ${inp('inv.transport','Transport en afval',v.transport)}
    ${inp('inv.grondwerk','Grondwerk / ROEF',v.grondwerk)}
    ${inp('inv.hekwerk','Hekwerk / brandscheiding',v.hekwerk)}
    ${inp('inv.pgs','PGS 37-1 documenten',v.pgs)}
    ${inp('inv.keuring','Keuring NEN-1010',v.keuring)}
    ${inp('inv.ac','AC werkzaamheden (stelpost)',v.ac)}
    ${inp('inv.bpm','BPM (optioneel)',v.bpm)}
    ${inp('inv.ems','EMS Smartbox',v.ems)}
  </div><p class="hint" style="padding:0 12px 10px">Totaal per kolom wordt automatisch berekend.</p></details>

  <details class="sec"><summary>Bedragen op werkzaamheden-pagina's</summary><div class="sec-body g2">
    ${inp('werk.grondwerk','Grondwerk (stelpost)',w.grondwerk)}
    ${inp('werk.hekwerk','Hekwerk',w.hekwerk)}
    ${inp('werk.pgs','PGS 37-1',w.pgs)}
    ${inp('werk.keuring','Keuring',w.keuring)}
    ${inp('werk.ac','AC (stelpost)',w.ac)}
    ${inp('werk.onderhoud','Jaarlijks onderhoud',w.onderhoud)}
    ${inp('werk.emsEen','EMS eenmalig',w.emsEen)}
    ${inp('werk.emsMaand','EMS per maand',w.emsMaand)}
  </div></details>

  <details class="sec"><summary>Jaarlijkse kosten + BTW</summary><div class="sec-body g2">
    ${inp('jaar.ems','EMS jaarlijks',j.ems)}
    ${inp('jaar.onderhoud','Onderhoud jaarlijks',j.onderhoud)}
    ${inp('btw','BTW %',D.btw)}
  </div></details>
  <div id="histBox"></div>`;
 document.querySelector('#form select[data-k="cols"]').value=D.cols;
}

// ===== state paths =====
function setPath(k,val){
 const parts=k.split('.'); let o=D;
 for(let i=0;i<parts.length-1;i++) o=o[parts[i]];
 o[parts[parts.length-1]]=val;
 if(k==='cols') o[parts[0]]=parseInt(val)||3, D.cols=parseInt(val)||3;
 persist(); render();
}
function persist(){try{localStorage.setItem(LSKEY,JSON.stringify({D,STORE}));toast('✓ opgeslagen');}catch(e){}}
function toast(t){const s=document.getElementById('saved');s.textContent=t;clearTimeout(toast._t);toast._t=setTimeout(()=>s.textContent='',1400);}

function loadLS(){try{const o=JSON.parse(localStorage.getItem(LSKEY));if(o&&o.D){D=o.D;STORE=o.STORE||{offers:[]};}}catch(e){}}
function newOffer(){if(confirm('Nieuwe lege offerte starten (voorbeeldteksten blijven)?')){D=defaults();D.customer={naam:'',adres1:'',adres2:'',plaatsdatum:'',referentie:'',contact:'Jimmy Lindeman',email:'jimmy@samsam.nu',onderwerp:'Aanbieding energieopslag',geldigheid:'14 dagen',aanhef:''};buildForm();render();persist();}}
function loadExample(){D=defaults();buildForm();render();persist();}

// ===== saved offers =====
function saveOffer(){const snap=JSON.parse(JSON.stringify(D));snap._id='o'+Date.now();snap._name=D.customer.naam||'(zonder naam)';snap._total=colTotal(0);STORE.offers.unshift(snap);persist();toast('💾 offerte bewaard');openHistory();}
function openHistory(){
 const box=document.getElementById('histBox');
 if(!STORE.offers.length){box.innerHTML='<p class="hint">Nog geen opgeslagen offertes.</p>';return;}
 box.innerHTML='<details class="sec" open><summary>Opgeslagen offertes</summary><div class="sec-body">'+
  STORE.offers.map(o=>`<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
    <div style="flex:1"><b>${esc(o._name)}</b><br><span class="hint">${eur(o._total)}</span></div>
    <button class="btn-ghost" style="color:#2563eb;background:#e0edff" onclick="loadOffer('${o._id}')">Open</button>
    <button class="btn-ghost" style="color:#b91c1c;background:#fee2e2" onclick="delOffer('${o._id}')">✕</button></div>`).join('')+
  '</div></details>';
}
function loadOffer(id){const o=STORE.offers.find(x=>x._id===id);if(!o)return;D=JSON.parse(JSON.stringify(o));buildForm();render();openHistory();}
function delOffer(id){STORE.offers=STORE.offers.filter(x=>x._id!==id);persist();openHistory();}

// ===== init =====
loadLS(); buildForm(); render();
</script>
</body>
</html>
